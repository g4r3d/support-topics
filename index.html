<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB — Справочник тем обращений</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   TOKENS — light theme (default)
═══════════════════════════════════════════════════════════ */
:root {
  --sidebar-w: 284px;
  --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);

  /* sidebar (always dark — same both themes) */
  --sidebar-bg:     #1E0045;
  --sidebar-mesh1:  rgba(203,17,171,0.28);
  --sidebar-mesh2:  rgba(91,31,160,0.45);

  /* brand */
  --wb-deep:    #2D0060;
  --wb-violet:  #7B35C8;
  --wb-magenta: #CB11AB;
  --wb-pink:    #E040C8;
}

/* ── LIGHT ── */
[data-theme="light"] {
  --bg-page:    #FBF0FF;
  --bg-grad:    linear-gradient(135deg, #F3E6FF 0%, #FFF0FA 50%, #EDE0FF 100%);
  --topbar-bg:  rgba(255,255,255,0.82);
  --topbar-border: rgba(200,160,240,0.3);
  --card-bg:    #FFFFFF;
  --card-border: rgba(180,130,230,0.25);
  --card-hover-border: rgba(123,53,200,0.4);
  --card-shadow: rgba(91,31,160,0.08);
  --card-hover-shadow: rgba(91,31,160,0.16);
  --text-main:  #1A0533;
  --text-mid:   #5A3878;
  --text-muted: #9B7EC0;
  --text-hint:  rgba(90,56,120,0.55);
  --accent-bar: linear-gradient(90deg, var(--wb-violet), var(--wb-magenta));
  --tag-color:  var(--wb-magenta);
  --badge-bg:   rgba(203,17,171,0.1);
  --badge-color: var(--wb-magenta);
  --stat-border: rgba(180,130,230,0.25);
  --stat-shadow: rgba(91,31,160,0.06);
  --divider:    rgba(200,160,240,0.3);
  --expand-bg:  linear-gradient(180deg, rgba(248,242,255,0.7) 0%, rgba(255,255,255,0) 100%);
  --hint-dot:   var(--wb-magenta);
  --home-hero-text: #1A0533;
  --scrollbar:  rgba(180,130,230,0.3);
  --topbar-count-bg: rgba(237,224,255,0.7);
  --topbar-count-border: rgba(180,130,230,0.3);
  --breadcrumb-link: var(--wb-violet);
  --nav-active-bg: rgba(255,255,255,0.06);
  --content-scrollbar: rgba(180,130,230,0.25);
  --hero-gradient: linear-gradient(135deg, #2D0060 0%, #6B22B0 55%, rgba(203,17,171,0.85) 100%);
  --pill-bg: rgba(203,17,171,0.09);
  --pill-color: var(--wb-magenta);
  --info-card-bg: rgba(255,255,255,0.7);
  --info-card-border: rgba(180,130,230,0.3);
}

/* ── DARK ── */
[data-theme="dark"] {
  --bg-page:    #120028;
  --bg-grad:    linear-gradient(135deg, #1A003A 0%, #22004A 50%, #180035 100%);
  --topbar-bg:  rgba(25,0,55,0.9);
  --topbar-border: rgba(120,60,200,0.25);
  --card-bg:    rgba(40,5,80,0.7);
  --card-border: rgba(100,50,180,0.3);
  --card-hover-border: rgba(180,80,255,0.5);
  --card-shadow: rgba(0,0,0,0.3);
  --card-hover-shadow: rgba(150,50,255,0.2);
  --text-main:  #F0E6FF;
  --text-mid:   #C8A8E8;
  --text-muted: #8A68B0;
  --text-hint:  rgba(180,140,220,0.55);
  --accent-bar: linear-gradient(90deg, #9B55E8, var(--wb-magenta));
  --tag-color:  #E060D0;
  --badge-bg:   rgba(224,64,200,0.18);
  --badge-color: #E888D8;
  --stat-border: rgba(120,60,200,0.3);
  --stat-shadow: rgba(0,0,0,0.3);
  --divider:    rgba(100,50,180,0.3);
  --expand-bg:  linear-gradient(180deg, rgba(50,5,90,0.6) 0%, transparent 100%);
  --hint-dot:   #E060D0;
  --home-hero-text: #F0E6FF;
  --scrollbar:  rgba(120,60,200,0.4);
  --topbar-count-bg: rgba(60,10,110,0.6);
  --topbar-count-border: rgba(120,60,200,0.3);
  --breadcrumb-link: #B880FF;
  --nav-active-bg: rgba(255,255,255,0.05);
  --content-scrollbar: rgba(120,60,200,0.3);
  --hero-gradient: linear-gradient(135deg, #0D0020 0%, #3B0080 55%, rgba(150,20,130,0.9) 100%);
  --pill-bg: rgba(224,64,200,0.15);
  --pill-color: #E888D8;
  --info-card-bg: rgba(40,5,80,0.5);
  --info-card-border: rgba(100,50,180,0.3);
}

/* ═══════════════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Manrope', sans-serif;
  color: var(--text-main);
  display: flex;
  height: 100vh;
  overflow: hidden;
  transition: color 0.3s;
  position: relative;
}

/* animated gradient canvas behind everything */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  animation: bgShift 12s ease-in-out infinite alternate;
  pointer-events: none;
}

[data-theme="light"] body::before {
  background:
    radial-gradient(ellipse 90% 70% at 15% 20%, #E8C8FF 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 85% 10%, #FFD0F5 0%, transparent 50%),
    radial-gradient(ellipse 70% 80% at 70% 85%, #D8B4FF 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 5%  80%, #FFC8F0 0%, transparent 50%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #F5EAFF 0%, #FBF0FF 100%);
}

[data-theme="dark"] body::before {
  background:
    radial-gradient(ellipse 90% 70% at 15% 20%, rgba(80,10,160,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 85% 10%, rgba(160,20,140,0.4) 0%, transparent 50%),
    radial-gradient(ellipse 70% 80% at 70% 85%, rgba(50,0,110,0.6) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 5%  80%, rgba(130,15,120,0.35) 0%, transparent 50%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #180035 0%, #120028 100%);
}

@keyframes bgShift {
  0%   { filter: hue-rotate(0deg)   saturate(1.0) brightness(1.0); transform: scale(1)    rotate(0deg); }
  25%  { filter: hue-rotate(12deg)  saturate(1.15) brightness(1.04); transform: scale(1.04) rotate(0.4deg); }
  50%  { filter: hue-rotate(-8deg)  saturate(1.1) brightness(0.97); transform: scale(1.02) rotate(-0.3deg); }
  75%  { filter: hue-rotate(18deg)  saturate(1.2) brightness(1.05); transform: scale(1.05) rotate(0.5deg); }
  100% { filter: hue-rotate(-5deg)  saturate(1.05) brightness(1.02); transform: scale(1.03) rotate(-0.2deg); }
}

/* second layer — floating orbs that drift slowly */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  animation: orbDrift 18s ease-in-out infinite alternate;
}

[data-theme="light"] body::after {
  background:
    radial-gradient(circle 320px at 25% 60%, rgba(203,17,171,0.12) 0%, transparent 70%),
    radial-gradient(circle 260px at 75% 35%, rgba(123,53,200,0.1) 0%, transparent 70%),
    radial-gradient(circle 200px at 55% 78%, rgba(224,64,200,0.09) 0%, transparent 70%);
}

[data-theme="dark"] body::after {
  background:
    radial-gradient(circle 320px at 25% 60%, rgba(203,17,171,0.18) 0%, transparent 70%),
    radial-gradient(circle 260px at 75% 35%, rgba(123,53,200,0.16) 0%, transparent 70%),
    radial-gradient(circle 200px at 55% 78%, rgba(180,40,180,0.14) 0%, transparent 70%);
}

@keyframes orbDrift {
  0%   { background-position: 0% 0%,   100% 0%,   50% 100%; opacity: 0.8; }
  33%  { background-position: 10% 20%,  80% 15%,  60% 80%;  opacity: 1; }
  66%  { background-position: -5% 10%,  90% 30%,  40% 90%;  opacity: 0.85; }
  100% { background-position: 5%  -5%,  75% 5%,   55% 70%;  opacity: 1; }
}

/* ensure all layout children sit above the bg layers */
.sidebar, .main {
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
  z-index: 20;
  box-shadow: 4px 0 40px rgba(20,0,60,0.45);
  overflow: hidden;
}

.sidebar::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 170% 130% at 115% -5%, var(--sidebar-mesh1) 0%, transparent 50%),
    radial-gradient(ellipse 110% 90% at -15% 115%, var(--sidebar-mesh2) 0%, transparent 50%);
  pointer-events: none;
}

/* header */
.sidebar-header {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sidebar-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  cursor: pointer;
}

.logo-mark {
  font-size: 20px;
  font-weight: 800;
  color: var(--wb-pink);
  letter-spacing: -0.5px;
}

.logo-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.18); }

.logo-label {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.sidebar-title {
  font-size: 11.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.4);
  line-height: 1.4;
}

/* theme toggle */
.theme-toggle {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
  cursor: pointer;
}

.theme-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  position: relative;
}

.theme-btn:hover { transform: scale(1.1); }

.theme-btn.active {
  background: rgba(255,255,255,0.15);
}

.theme-btn svg { width: 14px; height: 14px; }

/* search */
.search-wrap {
  padding: 10px 14px;
  flex-shrink: 0;
  position: relative;
}

.search-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 8px 12px 8px 34px;
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  color: #fff;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-input::placeholder { color: rgba(255,255,255,0.28); }
.search-input:focus { border-color: rgba(203,17,171,0.5); background: rgba(255,255,255,0.1); }

.search-icon {
  position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; opacity: 0.35; pointer-events: none;
}

/* nav */
.nav {
  flex: 1; overflow-y: auto;
  padding: 4px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: rgba(203,17,171,0.3) transparent;
}
.nav::-webkit-scrollbar { width: 3px; }
.nav::-webkit-scrollbar-thumb { background: rgba(203,17,171,0.3); border-radius: 2px; }

.nav-item { position: relative; }

.nav-cat {
  display: flex; align-items: center;
  padding: 9px 16px 9px 20px;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.6);
  cursor: pointer; gap: 7px;
  transition: color 0.15s, background 0.15s;
  user-select: none;
}
.nav-cat:hover { color: #fff; background: rgba(255,255,255,0.04); }
.nav-cat-text { flex: 1; line-height: 1.3; }

.nav-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px; font-weight: 500;
  color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.05);
  border-radius: 4px; padding: 1px 5px;
  flex-shrink: 0;
}

.nav-arrow {
  width: 13px; height: 13px; flex-shrink: 0;
  transition: transform 0.25s var(--ease-expo);
  opacity: 0.35;
}

.nav-item.open  .nav-arrow  { transform: rotate(90deg); opacity: 0.6; }
.nav-item.active > .nav-cat { color: #fff; }
.nav-item.active > .nav-cat .nav-badge {
  color: var(--wb-pink); background: rgba(203,17,171,0.18);
}
.nav-item.active > .nav-cat::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 65%;
  background: var(--wb-magenta); border-radius: 0 2px 2px 0;
}

.nav-topics {
  overflow: hidden; max-height: 0;
  transition: max-height 0.38s var(--ease-expo);
}
.nav-item.open .nav-topics { max-height: 1400px; }

.nav-topic {
  display: block;
  padding: 6px 16px 6px 34px;
  font-size: 11px; font-weight: 400;
  color: rgba(255,255,255,0.38);
  cursor: pointer; line-height: 1.35;
  border-left: 2px solid transparent;
  transition: color 0.12s, background 0.12s;
}
.nav-topic:hover { color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.04); }
.nav-topic.active { color: var(--wb-pink); border-left-color: rgba(203,17,171,0.45); background: rgba(203,17,171,0.06); }

/* ═══════════════════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: 56px;
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--topbar-border);
  display: flex; align-items: center;
  padding: 0 32px; gap: 10px;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: background 0.3s, border-color 0.3s;
}

.topbar-breadcrumb {
  display: flex; align-items: center; gap: 7px;
  font-size: 12.5px; color: var(--text-muted);
}
.topbar-breadcrumb .sep { font-size: 10px; opacity: 0.4; }
.topbar-breadcrumb .current { color: var(--text-main); font-weight: 600; }
.topbar-breadcrumb .link {
  color: var(--breadcrumb-link); cursor: pointer; transition: opacity 0.15s;
}
.topbar-breadcrumb .link:hover { opacity: 0.7; }

.topbar-count {
  margin-left: auto;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text-muted);
  background: var(--topbar-count-bg);
  border: 1px solid var(--topbar-count-border);
  border-radius: 6px; padding: 3px 10px;
  transition: background 0.3s;
}

.content {
  flex: 1; overflow-y: auto;
  padding: 32px 32px 60px;
  scrollbar-width: thin;
  scrollbar-color: var(--content-scrollbar) transparent;
  position: relative;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--content-scrollbar); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════
   HOME / WELCOME SCREEN
═══════════════════════════════════════════════════════════ */
.home-screen {
  max-width: 760px;
  animation: fadeUp 0.55s var(--ease-expo) both;
}

.home-hero {
  background: var(--hero-gradient);
  border-radius: 20px;
  padding: 44px 48px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; top: -70px; right: -70px;
  width: 220px; height: 220px; border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.home-hero::after {
  content: '';
  position: absolute; bottom: -50px; left: 35%;
  width: 180px; height: 180px; border-radius: 50%;
  background: rgba(203,17,171,0.14);
}

.home-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1.8px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
  position: relative; z-index: 1;
}
.home-tag::before {
  content: ''; display: block;
  width: 24px; height: 1.5px;
  background: rgba(255,255,255,0.4); border-radius: 1px;
}

.home-h1 {
  font-size: 42px; font-weight: 800;
  line-height: 1.08; letter-spacing: -1.5px;
  color: #fff;
  margin-bottom: 14px;
  position: relative; z-index: 1;
}
.home-h1 span {
  background: linear-gradient(120deg, #F090E0, var(--wb-pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.home-sub {
  font-size: 14.5px; font-weight: 400; line-height: 1.65;
  color: rgba(255,255,255,0.65);
  max-width: 520px;
  position: relative; z-index: 1;
}

.home-stats {
  display: flex; gap: 14px;
  margin-top: 28px;
  position: relative; z-index: 1;
}
.stat-pill {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  padding: 12px 20px;
  display: flex; align-items: baseline; gap: 8px;
}
.stat-pill-num {
  font-size: 26px; font-weight: 800; color: #fff;
  line-height: 1;
}
.stat-pill-label {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* info cards below hero */
.home-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 24px;
}

.info-card {
  background: var(--info-card-bg);
  border: 1px solid var(--info-card-border);
  border-radius: 16px;
  padding: 22px 24px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: background 0.3s, border-color 0.3s;
  animation: fadeUp 0.55s var(--ease-expo) both;
}
.info-card:nth-child(1) { animation-delay: 0.05s; }
.info-card:nth-child(2) { animation-delay: 0.1s; }
.info-card:nth-child(3) { animation-delay: 0.15s; grid-column: 1/-1; }

.info-card-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--tag-color);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.info-card-label::before {
  content: ''; display: block;
  width: 18px; height: 1.5px;
  background: var(--tag-color); border-radius: 1px;
}

.info-card-text {
  font-size: 13.5px; font-weight: 400; line-height: 1.7;
  color: var(--text-mid);
}

.info-card-text strong { color: var(--text-main); font-weight: 600; }

.home-hint {
  font-size: 12.5px; color: var(--text-hint);
  display: flex; align-items: center; gap: 10px;
  padding: 0 2px;
  animation: fadeUp 0.55s var(--ease-expo) 0.2s both;
}
/* flow block */
.flow-block {
  margin-top: 24px;
  background: var(--info-card-bg);
  border: 1px solid var(--info-card-border);
  border-radius: 18px;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: fadeUp 0.55s var(--ease-expo) 0.18s both;
}

.flow-header {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--info-card-border);
}

.flow-header-title {
  font-size: 14px; font-weight: 700;
  color: var(--text-main); letter-spacing: -0.2px;
}

.flow-header-sub {
  font-size: 11.5px; color: var(--text-muted); margin-top: 2px;
}

.flow-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--tag-color);
  background: var(--badge-bg);
  border-radius: 5px; padding: 3px 8px;
  flex-shrink: 0;
}

.flow-trigger {
  padding: 16px 24px 14px;
  border-bottom: 1px solid var(--info-card-border);
}

.flow-trigger-text {
  font-size: 13px; color: var(--text-mid); line-height: 1.65;
}

.flow-trigger-text strong { color: var(--text-main); font-weight: 600; }

.flow-cases {
  padding: 16px 24px 22px;
  display: flex; flex-direction: column; gap: 12px;
}

.flow-case {
  display: grid;
  grid-template-columns: 3px 1fr;
  gap: 14px;
}

.flow-case-bar {
  width: 3px; border-radius: 2px; align-self: stretch;
  min-height: 100%;
}

.flow-case-bar.red    { background: #E05555; }
.flow-case-bar.amber  { background: #E0A020; }
.flow-case-bar.green  { background: #29A86C; }

.flow-case-inner {}

.flow-case-cond {
  font-size: 12px; font-weight: 600;
  color: var(--text-main); margin-bottom: 5px; line-height: 1.4;
}

.flow-case-action {
  font-size: 12.5px; color: var(--text-mid); line-height: 1.6;
}

.flow-comment {
  display: inline-flex; align-items: flex-start; gap: 8px;
  background: var(--pill-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 7px 12px;
  margin-top: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 400;
  color: var(--pill-color);
  line-height: 1.5;
}

.flow-comment-icon { flex-shrink: 0; margin-top: 1px; opacity: 0.7; }

.home-hint::before {
  content: ''; display: block;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--hint-dot);
  animation: pulse 2.2s ease-in-out infinite;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════
   CATEGORY VIEW
═══════════════════════════════════════════════════════════ */
.cat-header {
  margin-bottom: 28px;
  animation: fadeUp 0.45s var(--ease-expo) both;
}
.cat-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--tag-color); margin-bottom: 8px;
}
.cat-title {
  font-size: 26px; font-weight: 800; letter-spacing: -0.8px;
  line-height: 1.15; color: var(--text-main); margin-bottom: 6px;
  transition: color 0.3s;
}
.cat-meta { font-size: 12.5px; color: var(--text-muted); }

.topics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 14px;
}

/* ═══════════════════════════════════════════════════════════
   TOPIC CARD
═══════════════════════════════════════════════════════════ */
.topic-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.22s var(--ease-expo), box-shadow 0.22s, border-color 0.22s, background 0.3s;
  animation: fadeUp 0.45s var(--ease-expo) both;
  position: relative;
}
.topic-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 44px var(--card-hover-shadow);
  border-color: var(--card-hover-border);
}
.topic-card:hover .card-accent { width: 100%; }

.card-accent {
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent-bar);
  width: 36px;
  border-radius: 0 0 2px 0;
  transition: width 0.32s var(--ease-expo);
}

.card-body { padding: 20px 20px 16px; }

.card-index {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px; font-weight: 500;
  color: var(--text-muted); margin-bottom: 9px;
  display: flex; align-items: center; gap: 8px;
}
.card-index::after {
  content: ''; flex: 1; height: 1px; background: var(--divider);
}

.card-title {
  font-size: 14px; font-weight: 700;
  color: var(--text-main); line-height: 1.35;
  margin-bottom: 10px; letter-spacing: -0.2px;
  transition: color 0.3s;
}

.card-desc {
  font-size: 12px; font-weight: 400;
  color: var(--text-mid); line-height: 1.6;
  transition: color 0.3s;
}
.card-desc.empty { color: var(--text-muted); font-style: italic; opacity: 0.6; }

/* "tap to expand" hint */
.card-tap-hint {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 10px;
  font-size: 11px; font-weight: 500;
  color: var(--wb-magenta); opacity: 0.7;
  transition: opacity 0.2s;
}
.topic-card:hover .card-tap-hint { opacity: 1; }
.topic-card.expanded .card-tap-hint { opacity: 0; height: 0; margin: 0; overflow: hidden; }

.card-tap-hint svg {
  width: 12px; height: 12px;
  transition: transform 0.25s;
}
.topic-card:hover .card-tap-hint svg { transform: translateY(1px); }

/* expanded */
.topic-card.expanded {
  border-color: var(--card-hover-border);
  box-shadow: 0 8px 48px var(--card-hover-shadow);
}
.topic-card.expanded .card-accent { width: 100%; }

.card-expanded-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s var(--ease-expo);
}
.topic-card.expanded .card-expanded-body { max-height: 800px; }

.card-divider {
  height: 1px;
  background: linear-gradient(90deg, var(--card-hover-border), transparent);
  margin: 0 20px;
}

.card-details {
  padding: 14px 20px 20px;
  background: var(--expand-bg);
}
.card-details-label {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--tag-color); margin-bottom: 8px;
  display: flex; align-items: center; gap: 7px;
}
.card-details-label::before {
  content: ''; display: block;
  width: 14px; height: 1.5px;
  background: var(--tag-color); border-radius: 1px;
}
.card-details-text {
  font-size: 12.5px; color: var(--text-mid); line-height: 1.72;
}

/* collapse row at bottom of expanded card */
.card-collapse-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 8px 20px 10px;
  font-size: 11px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  border-top: 1px solid var(--divider);
  transition: color 0.15s, background 0.15s;
  background: transparent;
}
.card-collapse-btn:hover { color: var(--wb-magenta); background: rgba(203,17,171,0.04); }
.card-collapse-btn svg { width: 11px; height: 11px; transition: transform 0.2s; }
.card-collapse-btn:hover svg { transform: translateY(-1px); }

/* stagger */
.topics-grid .topic-card:nth-child(1)  { animation-delay: 0.02s; }
.topics-grid .topic-card:nth-child(2)  { animation-delay: 0.05s; }
.topics-grid .topic-card:nth-child(3)  { animation-delay: 0.08s; }
.topics-grid .topic-card:nth-child(4)  { animation-delay: 0.11s; }
.topics-grid .topic-card:nth-child(5)  { animation-delay: 0.14s; }
.topics-grid .topic-card:nth-child(6)  { animation-delay: 0.17s; }
.topics-grid .topic-card:nth-child(7)  { animation-delay: 0.20s; }
.topics-grid .topic-card:nth-child(8)  { animation-delay: 0.23s; }
.topics-grid .topic-card:nth-child(n+9){ animation-delay: 0.26s; }

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.5); opacity: 0.55; }
}
@keyframes slideInLeft {
  from { transform: translateX(-100%); }
  to   { transform: translateX(0); }
}
@keyframes slideOutLeft {
  from { transform: translateX(0); }
  to   { transform: translateX(-100%); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ═══════════════════════════════════════════════════════════
   MOBILE HEADER (hidden on desktop)
═══════════════════════════════════════════════════════════ */
.mobile-header {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--sidebar-bg);
  z-index: 100;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  box-shadow: 0 2px 20px rgba(20,0,60,0.35);
  flex-shrink: 0;
}
.mobile-header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 200% 150% at 110% -20%, rgba(203,17,171,0.2) 0%, transparent 50%);
  pointer-events: none;
}

.mob-menu-btn {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
  position: relative; z-index: 1;
}
.mob-menu-btn:active { background: rgba(255,255,255,0.15); }
.mob-menu-btn svg { width: 18px; height: 18px; }

.mob-logo {
  flex: 1;
  display: flex; align-items: center; gap: 8px;
  position: relative; z-index: 1;
}
.mob-logo-mark {
  font-size: 18px; font-weight: 800;
  color: var(--wb-pink); letter-spacing: -0.5px;
}
.mob-logo-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); }
.mob-logo-label {
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase; letter-spacing: 0.5px;
}

.mob-theme-btn {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.2s;
  position: relative; z-index: 1;
}
.mob-theme-btn:active { background: rgba(255,255,255,0.15); }
.mob-theme-btn svg { width: 16px; height: 16px; }

/* ── Sidebar overlay (mobile) ── */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,0,30,0.55);
  z-index: 49;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  animation: fadeIn 0.25s ease both;
}
.sidebar-overlay.visible { display: block; }

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE — ≤ 768px
═══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* show mobile header */
  .mobile-header { display: flex; }

  /* body becomes column, top padding for fixed header */
  body {
    flex-direction: column;
    overflow: hidden;
  }

  /* sidebar becomes a drawer */
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform 0.32s cubic-bezier(0.16,1,0.3,1);
    width: min(300px, 88vw);
    min-width: unset;
    padding-top: 0;
  }
  .sidebar.mob-open {
    transform: translateX(0);
  }

  /* give extra top space in sidebar header for safe area */
  .sidebar-header {
    padding-top: 18px;
  }

  /* main fills below fixed header */
  .main {
    flex: 1;
    padding-top: 56px;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* hide desktop topbar on mobile (we have mobile-header) */
  .topbar { display: none; }

  /* content scrolls */
  .content {
    padding: 20px 16px 80px;
    flex: 1;
    overflow-y: auto;
  }

  /* home screen adjustments */
  .home-screen { max-width: 100%; }
  .home-hero { padding: 28px 24px; }
  .home-h1 { font-size: 30px; letter-spacing: -1px; }
  .home-sub { font-size: 13px; }
  .home-stats { gap: 10px; }
  .stat-pill-num { font-size: 22px; }
  .stat-pill { padding: 10px 16px; }

  /* info cards: stack to single column */
  .home-cards {
    grid-template-columns: 1fr;
  }
  .info-card:nth-child(3) { grid-column: unset; }

  /* flow block */
  .flow-header { padding: 16px 18px 14px; gap: 10px; flex-wrap: wrap; }
  .flow-header-title { font-size: 13px; }
  .flow-trigger { padding: 14px 18px; }
  .flow-cases { padding: 14px 18px 18px; gap: 10px; }
  .flow-comment { font-size: 10.5px; padding: 6px 10px; }

  /* category view */
  .cat-header { margin-bottom: 20px; }
  .cat-title { font-size: 20px; }

  /* cards: single column on small phones */
  .topics-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  /* card sizing */
  .card-body { padding: 16px 16px 12px; }
  .card-title { font-size: 13.5px; }
  .card-desc, .card-details-text { font-size: 12px; }
}

/* ── Extra small (≤ 380px) ── */
@media (max-width: 380px) {
  .home-h1 { font-size: 26px; }
  .home-hero { padding: 22px 18px; }
  .content { padding: 16px 12px 80px; }
}
</style>
</head>

/* ── STATE ────────────────────────────────────────────── */
let currentCat = null;

/* ── THEME ────────────────────────────────────────────── */
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btnLight').classList.toggle('active', t === 'light');
  document.getElementById('btnDark').classList.toggle('active',  t === 'dark');
  localStorage.setItem('wb-theme', t);
}
// restore saved theme
(function(){ const s = localStorage.getItem('wb-theme'); if(s) setTheme(s); })();

/* ── HELPERS ──────────────────────────────────────────── */
function shorten(str, n) {
  if (!str || str.length <= n) return str;
  return str.slice(0, n).trim() + '…';
}

const totalTopics = DATA.reduce((a,v) => a + v.topics.length, 0);

/* ── BUILD NAV ────────────────────────────────────────── */
function buildNav(q) {
  const nav = document.getElementById('navList');
  nav.innerHTML = '';
  q = (q || '').toLowerCase().trim();

  DATA.forEach((item, ci) => {
    const matchCat = !q || item.cat.toLowerCase().includes(q);
    const matchedTopics = q
      ? item.topics.filter(t => t.topic.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q))
      : item.topics;
    if (!matchCat && matchedTopics.length === 0) return;

    const div = document.createElement('div');
    div.className = 'nav-item' + (currentCat === ci ? ' active open' : '');
    div.dataset.ci = ci;

    div.innerHTML = `
      <div class="nav-cat">
        <span class="nav-cat-text">${item.cat}</span>
        <svg class="nav-arrow" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"><polyline points="4,2 8,6 4,10"/></svg>
      </div>
      <div class="nav-topics">
        ${matchedTopics.map(t => {
          const ti = item.topics.indexOf(t);
          return `<div class="nav-topic${currentCat===ci ? ' active' : ''}" data-ci="${ci}" data-ti="${ti}">${t.topic}</div>`;
        }).join('')}
      </div>`;

    // click category:
    // desktop → toggle open + navigate in one tap (existing behavior)
    // mobile  → first tap just expands, second tap navigates
    div.querySelector('.nav-cat').addEventListener('click', () => {
      const isOpen = div.classList.contains('open');
      const isActive = currentCat === ci;

      if (isMobile()) {
        if (!isOpen) {
          // first tap on mobile: just expand, close others
          document.querySelectorAll('.nav-item.open').forEach(el => { if(el!==div) el.classList.remove('open'); });
          div.classList.add('open');
        } else if (!isActive) {
          // second tap on mobile: now navigate
          document.querySelectorAll('.nav-item').forEach(el => { if(el!==div) el.classList.remove('active'); });
          div.classList.add('active');
          showCategory(ci);
        } else {
          // already open and active → collapse and go home
          div.classList.remove('open', 'active');
          currentCat = null;
          showHome();
        }
      } else {
        // desktop: one-tap behavior
        if (isOpen && isActive) {
          div.classList.remove('open', 'active');
          currentCat = null;
          showHome();
        } else {
          document.querySelectorAll('.nav-item.open').forEach(el => { if(el!==div) el.classList.remove('open'); });
          div.classList.add('open', 'active');
          document.querySelectorAll('.nav-item').forEach(el => { if(el!==div) el.classList.remove('active'); });
          showCategory(ci);
        }
      }
    });

    // click topic → scroll to card
    div.querySelectorAll('.nav-topic').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const ti = parseInt(el.dataset.ti);
        if (currentCat !== ci) showCategory(ci);
        setTimeout(() => {
          const card = document.querySelector(`.topic-card[data-ti="${ti}"]`);
          if (card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // highlight briefly
            card.style.boxShadow = '0 0 0 2px var(--wb-magenta)';
            setTimeout(() => card.style.boxShadow = '', 1000);
          }
        }, currentCat !== ci ? 80 : 0);
        document.querySelectorAll('.nav-topic').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if (isMobile()) setTimeout(closeMobMenu, 120);
      });
    });

    nav.appendChild(div);
  });

  if (nav.children.length === 0) {
    nav.innerHTML = '<div style="color:rgba(255,255,255,0.28);padding:16px 24px;font-size:12px;">Ничего не найдено</div>';
  }
}

                  <path d="M4 11l2.5-2H12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M4 4.5h5M4 6.5h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
                «Тема была изменена на ближайшую соответствующую вопросу, требуется уточнение содержания темы»
              </div>
            </div>
          </div>

          <div class="flow-case">
            <div class="flow-case-bar green"></div>
            <div class="flow-case-inner">
              <div class="flow-case-cond">Оператор уверен в корректности выбранной темы</div>
              <div class="flow-case-action"><strong>Изменить тему</strong> на корректную. Комментарий оставлять не требуется.</div>
            </div>
          </div>
        </div>
      </div>

      <div class="home-hint" style="margin-top:24px;">Выберите категорию в меню слева для просмотра тематик и описаний</div>
    </div>`;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'open'));
  document.querySelectorAll('.nav-topic').forEach(el => el.classList.remove('active'));
}

/* ── SHOW CATEGORY ────────────────────────────────────── */
function showCategory(ci) {
  currentCat = ci;
  const item = DATA[ci];

  document.getElementById('breadcrumb').innerHTML = `
    <span class="link" onclick="showHome()">Справочник</span>
    <span class="sep">›</span>
    <span class="current">${item.cat}</span>`;
  document.getElementById('topbarCount').textContent = `${item.topics.length} тем`;

  document.getElementById('content').innerHTML = `
    <div class="cat-header">
      <div class="cat-tag">Категория · ${ci + 1} из ${DATA.length}</div>
      <h2 class="cat-title">${item.cat}</h2>
      <div class="cat-meta">Нажмите на карточку, чтобы раскрыть описание</div>
    </div>
    <div class="topics-grid">
      ${item.topics.map((t, ti) => {
        const hasDesc = t.desc && t.desc.trim();
        return `
        <div class="topic-card" data-ci="${ci}" data-ti="${ti}" onclick="toggleCard(this,${ci},${ti})">
          <div class="card-accent"></div>
          <div class="card-body">
            <div class="card-index">${String(ti+1).padStart(2,'0')}</div>
            <div class="card-title">${t.topic}</div>
            ${hasDesc
              ? `<div class="card-desc">${shorten(t.desc, 140)}</div>
                 <div class="card-tap-hint">
                   <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>
                   Нажмите, чтобы посмотреть полное описание темы
                 </div>`
              : `<div class="card-desc empty">Описание отсутствует</div>`
            }
          </div>
          ${hasDesc ? `
          <div class="card-expanded-body">
            <div class="card-divider"></div>
            <div class="card-details">
              <div class="card-details-label">Полное описание</div>
              <div class="card-details-text">${t.desc}</div>
            </div>
            <div class="card-collapse-btn" onclick="collapseCard(event, this)">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,8 6,4 10,8"/></svg>
              Свернуть
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>`;

  // update nav state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.ci) === ci);
    if (parseInt(el.dataset.ci) === ci) el.classList.add('open');
  });
}

/* ── CARD TOGGLE ──────────────────────────────────────── */
function toggleCard(el, ci, ti) {
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.topic-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) el.classList.add('expanded');
}

function collapseCard(e, btn) {
  e.stopPropagation();
  btn.closest('.topic-card').classList.remove('expanded');
}

/* ── SEARCH ───────────────────────────────────────────── */
let _st;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(_st);
  _st = setTimeout(() => buildNav(e.target.value), 170);
});

/* ── MOBILE MENU ──────────────────────────────────────── */
function isMobile() { return window.innerWidth <= 768; }

function openMobMenu() {
  document.getElementById('sidebar').classList.add('mob-open');
  document.getElementById('sidebarOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
  // switch to X icon
  document.getElementById('mobMenuIcon').innerHTML = `
    <line x1="3" y1="3" x2="15" y2="15"/>
    <line x1="15" y1="3" x2="3" y2="15"/>`;
}

function closeMobMenu() {
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
  document.body.style.overflow = '';
  // switch back to burger icon
  document.getElementById('mobMenuIcon').innerHTML = `
    <line x1="2" y1="4.5" x2="16" y2="4.5"/>
    <line x1="2" y1="9" x2="16" y2="9"/>
    <line x1="2" y1="13.5" x2="16" y2="13.5"/>`;
}

function toggleMobMenu() {
  const isOpen = document.getElementById('sidebar').classList.contains('mob-open');
  isOpen ? closeMobMenu() : openMobMenu();
}

/* ── MOBILE THEME TOGGLE ──────────────────────────────── */
function toggleThemeMob() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  setTheme(next);
  // update mob icon
  const icon = document.getElementById('mobThemeIcon');
  if (next === 'dark') {
    icon.innerHTML = `<path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z" stroke="#A0C0FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  } else {
    icon.innerHTML = `<circle cx="8" cy="8" r="3" stroke="#FFD060" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="#FFD060" stroke-width="1.5" stroke-linecap="round"/>`;
  }
}

/* sync mob icon on page load */
(function() {
  const t = localStorage.getItem('wb-theme') || 'light';
  const icon = document.getElementById('mobThemeIcon');
  if (t === 'dark') {
    icon.innerHTML = `<path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z" stroke="#A0C0FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  }
})();

/* close drawer when nav category is clicked on mobile */
const _origShowCategory = showCategory;
window.showCategory = function(ci) {
  _origShowCategory(ci);
  if (isMobile()) closeMobMenu();
};

/* swipe to close sidebar on mobile */
(function() {
  let startX = 0;
  document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (dx < -60 && document.getElementById('sidebar').classList.contains('mob-open')) {
      closeMobMenu();
    }
  }, { passive: true });
})();

/* ── INIT ─────────────────────────────────────────────── */
buildNav('');
showHome();
</script>

</body>
